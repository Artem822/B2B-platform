{% extends 'base.html' %}

{% block title %}Письмо отправлено - ServerPro B2B{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="card-header bg-success text-white">
            <i class="bi bi-envelope-check fs-1 mb-2 d-block"></i>
            <h4 class="mb-0">Письмо отправлено</h4>
        </div>
        <div class="card-body text-center">
            <p class="mb-4">
                Мы отправили вам письмо с инструкциями по сбросу пароля. 
                Проверьте вашу почту.
            </p>
            <div class="alert alert-info">
                <i class="bi bi-info-circle me-2"></i>
                Если письмо не пришло, проверьте папку "Спам"
            </div>
            <a href="{% url 'accounts:login' %}" class="btn btn-primary">
                <i class="bi bi-arrow-left me-2"></i>Вернуться к входу
            </a>
        </div>
    </div>
</div>
{% endblock %}
