{% extends 'base.html' %}

{% block title %}Пароль изменён - ServerPro B2B{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="card-header bg-success text-white">
            <i class="bi bi-check-circle fs-1 mb-2 d-block"></i>
            <h4 class="mb-0">Пароль изменён!</h4>
        </div>
        <div class="card-body text-center">
            <p class="mb-4">
                Ваш пароль был успешно изменён. 
                Теперь вы можете войти с новым паролем.
            </p>
            <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg">
                <i class="bi bi-box-arrow-in-right me-2"></i>Войти в систему
            </a>
        </div>
    </div>
</div>
{% endblock %}
