{% extends 'dashboard/base.html' %}

{% block title %}Настройки{% endblock %}
{% block page_title %}Настройки сайта{% endblock %}

{% block content %}
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    
    <div class="row g-4">
        <div class="col-lg-8">
            <!-- General -->
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="bi bi-gear me-2"></i>Общие настройки</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Название сайта</label>
                            <input type="text" name="site_name" class="form-control" 
                                   value="{{ settings.site_name }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" 
                                   value="{{ settings.email }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Описание</label>
                            <textarea name="site_description" class="form-control" rows="2">{{ settings.site_description }}</textarea>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Contacts -->
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="bi bi-telephone me-2"></i>Контакты</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Телефон</label>
                            <input type="text" name="phone" class="form-control" 
                                   value="{{ settings.phone }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">WhatsApp</label>
                            <input type="text" name="whatsapp" class="form-control" 
                                   value="{{ settings.whatsapp }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Адрес</label>
                            <textarea name="address" class="form-control" rows="2">{{ settings.address }}</textarea>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Social -->
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="bi bi-share me-2"></i>Социальные сети</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">VK</label>
                            <input type="url" name="vk_url" class="form-control" 
                                   value="{{ settings.vk_url }}" placeholder="https://vk.com/...">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Telegram</label>
                            <input type="url" name="telegram_url" class="form-control" 
                                   value="{{ settings.telegram_url }}" placeholder="https://t.me/...">
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Shop Settings -->
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="bi bi-shop me-2"></i>Настройки магазина</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Мин. сумма заказа</label>
                            <div class="input-group">
                                <input type="number" name="min_order_amount" class="form-control" 
                                       value="{{ settings.min_order_amount|floatformat:0 }}" min="0" step="100">
                                <span class="input-group-text">₽</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Бесплатная доставка от</label>
                            <div class="input-group">
                                <input type="number" name="free_delivery_amount" class="form-control" 
                                       value="{{ settings.free_delivery_amount|floatformat:0 }}" min="0" step="100">
                                <span class="input-group-text">₽</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Стоимость доставки</label>
                            <div class="input-group">
                                <input type="number" name="delivery_cost" class="form-control" 
                                       value="{{ settings.delivery_cost|floatformat:0 }}" min="0" step="50">
                                <span class="input-group-text">₽</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-lg-4">
            <!-- Logo -->
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0">Логотип</h6>
                </div>
                <div class="card-body">
                    {% if settings.logo %}
                    <div class="mb-3 text-center">
                        <img src="{{ settings.logo.url }}" alt="Logo" class="img-fluid" style="max-height: 80px;">
                    </div>
                    {% endif %}
                    <input type="file" name="logo" class="form-control" accept="image/*">
                </div>
            </div>
            
            <!-- Save -->
            <div class="card">
                <div class="card-body">
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-lg me-2"></i>Сохранить настройки
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>
{% endblock %}
